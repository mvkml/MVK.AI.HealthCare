<div class="app">
  <app-chat-rail [persona]="railPersona()" [historyItems]="historyItems" (logout)="onLogout()" />

  <main class="chat">
    <header class="chat-head">
      <div>
        <h1>My health assistant</h1>
        <div class="context-bar">
          <span class="badge badge-guard">LLM only — not database-grounded yet</span>
        </div>
      </div>
      <div class="theme-note">HC.AI.MAPI · Patient persona</div>
    </header>

    <app-message-list [messages]="messages()" />

    @if (isSending()) {
      <div class="status-line">Thinking… local Ollama responses currently take up to ~30s.</div>
    }

    @if (errorMessage()) {
      <div class="error-banner" role="alert">{{ errorMessage() }}</div>
    }

    <app-composer (send)="onSend($event)" [disabled]="isSending()" />
  </main>
</div>
